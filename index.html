<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好運椿椿｜圓周角與直徑探索任務</title>
    <style>
        /* --- 網頁樣式 (CSS) --- */
        :root { --main-pink: #ffb7c5; --bg-color: #fff5f7; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #d63384; text-align: center; }
        
        /* 互動區域佈局 */
        .main-layout { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .canvas-area { flex: 1; min-width: 350px; border: 3px dashed var(--main-pink); border-radius: 15px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; background: #fff; }
        .side-panel { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 15px; }

        /* 按鈕與介面 */
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .primary-btn { background-color: var(--main-pink); color: white; width: 100%; }
        .primary-btn:hover { background-color: #ff99aa; }
        .sos-btn { background-color: #ffd166; color: #333; }
        
        /* 機器人區域 */
        .chun-bot-box { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; }
        .chat-bubble { background: white; border: 2px solid var(--main-pink); border-radius: 20px; padding: 15px; margin-bottom: 10px; max-width: 280px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; line-height: 1.6; font-size: 15px; position: relative; }
        .chat-bubble::after { content: ''; position: absolute; bottom: -10px; right: 35px; border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent; }
        .avatar-container { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 15px var(--main-pink); overflow: hidden; cursor: pointer; transition: 0.3s; background: white; }
        .avatar-container:hover { transform: scale(1.1) rotate(5deg); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 動畫效果 */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .jump-animation { animation: bounce 0.5s ease 3; }
        .emoji-layer { position: absolute; top: -40px; right: 20px; font-size: 30px; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 探索直徑：圓周角偵探任務</h1>
        <p>觀察當 $\angle ACB$ 變成直角時，弦 $AB$ 有什麼變化？</p>
    </header>

    <div class="main-layout">
        <div class="canvas-area">
            <div style="text-align: center; color: #888;">
                <p>【此處連動您的圓形操作程式碼】</p>
                <p>您可以點擊右側選項模擬操作</p>
            </div>
        </div>

        <div class="side-panel">
            <div style="background: #fff0f3; padding: 20px; border-radius: 15px;">
                <h3>第 4 關：誰才是「真直徑」？</h3>
                <p>技師發現 $\angle ACB$ 剛好是 $90^\circ$。請問 $AB$ 的性質是？</p>
                <label style="display:block; margin-bottom:10px;"><input type="radio" name="q4" value="wrong1"> A. $AC$ 和 $BC$ 一定一樣長</label>
                <label style="display:block; margin-bottom:10px;"><input type="radio" name="q4" value="correct"> B. $AB$ 是這個圓的直徑</label>
                <label style="display:block; margin-bottom:15px;"><input type="radio" name="q4" value="wrong2"> C. 點 $C$ 一定在圓心</label>
                <button class="btn primary-btn" onclick="checkMathAnswer()">送出我的判斷</button>
            </div>
            <button class="btn sos-btn" onclick="askTeacher('我卡住了，請給我一點提示。')">🆘 椿椿老師求救</button>
        </div>
    </div>

    <div class="chun-bot-box">
        <div id="chatBubble" class="chat-bubble"></div>
        <div class="avatar-container" onclick="askTeacher('老師，我想更了解這個主題。')">
            <img src="網頁首頁.jpg" alt="椿椿老師" class="avatar-img" id="teacherAvatar">
            <div id="emojiLayer" class="emoji-layer"></div>
        </div>
    </div>
</div>

<script>
    /* --- 核心邏輯 (JavaScript) --- */
    
    // 您的 API KEY
    const API_KEY = "gen-lang-client-0772758720"; 
    let errorCount = 0;

    // 1. 顯示對話內容
    function showMessage(text, isHappy = false) {
        const bubble = document.getElementById('chatBubble');
        const avatar = document.getElementById('teacherAvatar');
        const emojis = document.getElementById('emojiLayer');
        
        bubble.innerText = text;
        bubble.style.display = 'block';
        
        if (isHappy) {
            avatar.parentElement.classList.add('jump-animation');
            emojis.innerText = "✨😊";
            setTimeout(() => {
                avatar.parentElement.classList.remove('jump-animation');
                emojis.innerText = "";
            }, 3000);
        }
    }

    // 2. 檢查學生答案
    function checkMathAnswer() {
        const selected = document.querySelector('input[name="q4"]:checked');
        if (!selected) {
            showMessage("請先選一個答案喔！");
            return;
        }

        if (selected.value === 'correct') {
            errorCount = 0;
            showMessage("太棒了！你的觀察非常準確，這就是圓周角的重要性質喔！", true);
        } else {
            errorCount++;
            if (errorCount >= 2) {
                askTeacher("學生連續兩次答錯了，他現在很困惑。請用引導方式幫他，不要直接給答案。");
            } else {
                showMessage("唔...好像不是這樣。再觀察看看曲尺的對邊？");
            }
        }
    }

    // 3. 呼叫 Gemini AI
    async function askTeacher(userPrompt) {
        showMessage("椿椿老師正在思考如何引導你...");
        
        // 老師的人格設定
        const sysInstruction = "你是一位親切的台灣國中數學老師『椿椿』。學生正在探索『當圓周角是 90 度時，其對應的弦是直徑』。規則：1.絕對不直接給答案。2.使用提問法引導。3.語氣要溫柔且有耐心。";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userPrompt }] }],
                    system_instruction: { parts: [{ text: sysInstruction }] }
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            showMessage(aiText);
        } catch (error) {
            console.error("AI 錯誤:", error);
            showMessage("哎呀，椿椿老師現在稍微分心了，請再試一次或自己觀察看看？");
        }
    }
</script>

</body>
</html>
